<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morphing Typography Clock</title>
    <style>
        :root {
            --bg-color: #020617;
            --hour-color: #fbbf24;   /* Amber */
            --minute-color: #f43f5e; /* Rose */
            --second-color: #38bdf8; /* Sky Blue */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: grid;
            place-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #0f172a, var(--bg-color));
            overflow: hidden;
            /* Fallback font just in case, though the numbers are SVG paths */
            font-family: 'Quicksand', system-ui, sans-serif;
        }

        /* Using your cqw layout perfectly for infinite scaling.
           We've widened the aspect ratio to 3.5/1 to neatly fit the seconds!
        */
        .clock-container {
            width: 90vw;
            max-width: 1000px;
            aspect-ratio: 3.5 / 1; 
            container-type: inline-size;
            position: relative;
            border-radius: 6cqw;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .mint-rounded-clock {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            overflow: hidden;
            border-radius: inherit;
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 2cqw;
        }

        .morph-clock-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* The morphing magic lines */
        .digit-path {
            fill: none;
            stroke-width: 14; /* Bold, uniform width similar to a modern font */
            stroke-linecap: round;
            stroke-linejoin: round;
            /* The cubic-bezier gives it a snappy, liquid morph transition */
            transition: d 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* The glowing colors restored */
        .h-color { 
            stroke: var(--hour-color); 
            filter: drop-shadow(0 0 6px rgba(251, 191, 36, 0.8)) drop-shadow(0 0 16px rgba(251, 191, 36, 0.4)); 
        }
        .m-color { 
            stroke: var(--minute-color); 
            filter: drop-shadow(0 0 6px rgba(244, 63, 94, 0.8)) drop-shadow(0 0 16px rgba(244, 63, 94, 0.4));
        }
        .s-color { 
            stroke: var(--second-color); 
            filter: drop-shadow(0 0 6px rgba(56, 189, 248, 0.8)) drop-shadow(0 0 16px rgba(56, 189, 248, 0.4));
        }

        /* Solid fills for the colons */
        circle.h-color { fill: var(--hour-color); stroke: none; }
        circle.m-color { fill: var(--minute-color); stroke: none; }
        
        .colon {
            transition: opacity 0.1s linear;
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div class="mint-rounded-clock">
            <!-- 840x240 view box maintains the exact 3.5 ratio spacing -->
            <svg class="morph-clock-svg" viewBox="0 0 840 240">
                
                <!-- HOURS -->
                <g transform="translate(30, 20)">
                    <path id="h1" class="digit-path h-color" d="" />
                </g>
                <g transform="translate(140, 20)">
                    <path id="h2" class="digit-path h-color" d="" />
                </g>

                <!-- COLON 1 -->
                <g transform="translate(265, 20)">
                    <circle cx="10" cy="60" r="10" class="colon h-color" />
                    <circle cx="10" cy="140" r="10" class="colon h-color" />
                </g>

                <!-- MINUTES -->
                <g transform="translate(310, 20)">
                    <path id="m1" class="digit-path m-color" d="" />
                </g>
                <g transform="translate(420, 20)">
                    <path id="m2" class="digit-path m-color" d="" />
                </g>

                <!-- COLON 2 -->
                <g transform="translate(545, 20)">
                    <circle cx="10" cy="60" r="10" class="colon m-color" />
                    <circle cx="10" cy="140" r="10" class="colon m-color" />
                </g>

                <!-- SECONDS -->
                <g transform="translate(590, 20)">
                    <path id="s1" class="digit-path s-color" d="" />
                </g>
                <g transform="translate(700, 20)">
                    <path id="s2" class="digit-path s-color" d="" />
                </g>
            </svg>
        </div>
    </div>

    <script>
        /**
         * REDRAWN GEOMETRIC "QUICKSAND" STYLE DIGITS:
         * These paths have been entirely recalculated to look like a clean, 
         * rounded, geometric modern font. They still maintain exactly 1 Move (M) 
         * and 4 Cubic Bezier (C) commands to allow for fluid morphing.
         */
        const digitPaths = [
            "M 50 20 C 15 20 15 60 15 100 C 15 140 15 180 50 180 C 85 180 85 140 85 100 C 85 60 85 20 50 20", // 0: Clean geometric pill
            "M 35 40 C 50 20 50 20 50 20 C 50 75 50 125 50 180 C 50 180 50 180 50 180 C 50 180 50 180 50 180", // 1: Sharp line with a tiny modern hook
            "M 20 60 C 20 15 80 15 80 60 C 80 105 50 135 20 180 C 45 180 65 180 85 180 C 85 180 85 180 85 180", // 2: Round top bow, angled stem, straight base
            "M 25 45 C 25 15 75 15 75 50 C 75 80 50 95 45 100 C 60 105 85 120 80 150 C 75 190 25 185 25 155", // 3: Twin proportional round bows
            "M 70 180 C 70 120 70 60 70 20 C 40 60 20 90 20 130 C 40 130 70 130 90 130 C 90 130 90 130 90 130", // 4: Clean diagonal, sharp crossbar, straight stem
            "M 75 25 C 50 25 25 25 25 25 C 25 50 25 85 25 85 C 55 70 85 90 80 140 C 75 190 25 180 25 150",       // 5: Straight top, straight spine, circular bottom bowl
            "M 75 35 C 50 15 20 40 20 100 C 20 180 80 180 80 140 C 80 100 20 100 20 140 C 20 140 20 140 20 140", // 6: Sweeping arc into a perfect circle
            "M 20 25 C 45 25 65 25 85 25 C 75 75 55 125 40 180 C 40 180 40 180 40 180 C 40 180 40 180 40 180", // 7: Straight horizontal bar, smooth angled stem
            "M 50 100 C 85 90 85 20 50 20 C 15 20 15 90 50 100 C 85 110 85 180 50 180 C 15 180 15 110 50 100", // 8: Twin perfectly balanced circular loops
            "M 80 100 C 80 20 20 20 20 60 C 20 100 80 100 80 60 C 80 130 70 180 30 165 C 30 165 30 165 30 165"  // 9: Perfect circular top loop, sweeping tail
        ];

        // State tracking
        const currentState = { h1: -1, h2: -1, m1: -1, m2: -1, s1: -1, s2: -1 };
        const colons = document.querySelectorAll('.colon');

        // Initialize paths so the load animation plays beautifully
        Object.keys(currentState).forEach(key => {
            document.getElementById(key).setAttribute('d', digitPaths[0]);
        });

        function updateClock() {
            const now = new Date();
            
            // Format 12-hour string (e.g., "09", "12")
            let h = now.getHours() % 12;
            h = h ? h : 12; 
            const hh = String(h).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');

            const nextState = {
                h1: parseInt(hh[0]), h2: parseInt(hh[1]),
                m1: parseInt(mm[0]), m2: parseInt(mm[1]),
                s1: parseInt(ss[0]), s2: parseInt(ss[1])
            };

            // Trigger morph animation if digit has changed
            for (const key in nextState) {
                if (nextState[key] !== currentState[key]) {
                    document.getElementById(key).setAttribute('d', digitPaths[nextState[key]]);
                    currentState[key] = nextState[key];
                }
            }

            // Smooth pulse effect for the colons tied directly to the milliseconds
            const ms = now.getMilliseconds();
            const pulseOpacity = 0.2 + 0.8 * Math.abs(Math.sin((ms / 1000) * Math.PI));
            colons.forEach(c => c.style.opacity = pulseOpacity.toFixed(2));

            requestAnimationFrame(updateClock);
        }

        // Delay slightly on start for a pleasing "wake up" transition from '00' to current time
        setTimeout(() => {
            requestAnimationFrame(updateClock);
        }, 100);
    </script>
</body>
</html>
